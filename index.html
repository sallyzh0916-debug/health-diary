<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4f2ed">
<title>健康日记</title>
<style>
:root{--bg:#f4f2ed;--surface:#fff;--surface2:#edeae3;--border:#ddd9d0;--text:#1a1814;--text2:#6b6558;--text3:#a09890;--accent:#4a7c6f;--accent-light:#e4f0ed;--red:#8b3a3a;--red-light:#f5e8e8;--amber:#7a5f2a;--amber-light:#f7f0e0;--blue:#2a5a7a;--blue-light:#e4eef7;--gray:#5f5e5a;--gray-light:#f0ede6;--r:12px;--r-lg:18px;--tab-h:62px;--top-h:56px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{height:var(--top-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.topbar-title{flex:1;font-size:17px;font-weight:600;color:var(--text)}
.draft-pill{font-size:11px;color:var(--accent);background:var(--accent-light);padding:3px 10px;border-radius:20px;opacity:0;transition:opacity .3s;white-space:nowrap}
.draft-pill.on{opacity:1}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + 20px)}
.page{display:none;padding:14px 14px 0}
.page.active{display:block}
.form-card{background:var(--surface);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.field{margin-bottom:14px}
.field-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.time-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.time-sep{text-align:center;font-size:14px;color:var(--text3);font-weight:500}
.picker-display{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;font-size:15px;font-family:inherit;color:var(--text);text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.picker-display .arr{color:var(--text3);font-size:12px;flex-shrink:0;margin-left:4px}
.picker-display.ph{color:var(--text3)}
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.type-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 4px;font-size:12px;font-family:inherit;color:var(--text2);cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .15s}
.type-btn .dot{width:9px;height:9px;border-radius:50%}
.type-btn.sel-sleep{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.type-btn.sel-meal{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.type-btn.sel-med{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.type-btn.sel-episode{background:var(--red-light);border-color:var(--red);color:var(--red)}
.type-btn.sel-note{background:var(--gray-light);border-color:var(--gray);color:var(--gray);font-weight:500}
.sev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sev-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 4px;font-size:13px;font-family:inherit;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.sev-btn.sel-none{font-weight:500}
.sev-btn.sel-mild{background:#eaf3de;border-color:#639922;color:#27500a;font-weight:500}
.sev-btn.sel-mod{background:var(--amber-light);border-color:var(--amber);color:var(--amber);font-weight:500}
.sev-btn.sel-sev{background:var(--red-light);border-color:var(--red);color:var(--red);font-weight:500}
input[type=text]{width:100%;font-family:inherit;font-size:15px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:11px 13px;outline:none;-webkit-appearance:none}
input[type=text]:focus{border-color:var(--accent)}
.btn-add{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:15px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:14px;letter-spacing:.03em}
.btn-add:active{opacity:.85}
/* log entries with swipe-to-delete */
.day-block{margin-bottom:20px}
.day-head{display:flex;align-items:center;gap:8px;padding:0 2px;margin-bottom:9px}
.day-date-label{font-size:13px;font-weight:600;color:var(--text2)}
.day-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:20px}
.swipe-wrapper{position:relative;margin-bottom:8px}
.del-bg{position:absolute;right:0;top:0;bottom:0;width:88px;background:var(--red);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:0 var(--r-lg) var(--r-lg) 0;z-index:0}
.del-bg-txt{color:#fff;font-size:11px;font-weight:600;margin-top:2px}
.del-bg-icon{color:#fff;font-size:20px;line-height:1}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;align-items:stretch;overflow:hidden;position:relative;z-index:1;transition:transform .25s ease;cursor:pointer}
.entry-card.swiped{transform:translateX(-88px)}
.entry-stripe{width:5px;flex-shrink:0}
.stripe-sleep{background:var(--accent)}.stripe-meal{background:var(--blue)}.stripe-med{background:#9a7a3a}.stripe-episode{background:var(--red)}.stripe-note{background:var(--gray)}
.entry-body{flex:1;min-width:0;padding:12px 0 12px 12px}
.entry-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-sleep{background:var(--accent-light);color:var(--accent)}.b-meal{background:var(--blue-light);color:var(--blue)}.b-med{background:var(--amber-light);color:var(--amber)}.b-episode{background:var(--red-light);color:var(--red)}.b-note{background:var(--gray-light);color:var(--gray)}
.sev-tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.sev-mild{background:#eaf3de;color:#27500a}.sev-mod{background:var(--amber-light);color:var(--amber)}.sev-sev{background:var(--red-light);color:var(--red)}
.entry-time-txt{font-size:11px;color:var(--text3)}
.entry-detail{font-size:14px;color:var(--text);word-break:break-word;margin-top:2px}
.entry-detail.muted{color:var(--text3);font-style:italic}
.entry-edit-icon{color:var(--text3);font-size:13px;padding:0 14px;align-self:center;flex-shrink:0}
.empty{text-align:center;padding:60px 24px;color:var(--text3);font-size:14px}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.stat-n{font-size:30px;font-weight:700;color:var(--text);line-height:1}
.stat-l{font-size:12px;color:var(--text3);margin-top:5px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--text2);width:36px;flex-shrink:0}
.bar-track{flex:1;background:var(--surface2);border-radius:4px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-count{font-size:12px;color:var(--text3);width:22px;text-align:right}
.setting-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px}
.setting-row{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--border);gap:13px;cursor:pointer}
.setting-row:last-child{border-bottom:none}
.setting-row:active{background:var(--surface2)}
.setting-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.setting-label{font-size:15px;color:var(--text);flex:1}
.setting-sub{font-size:12px;color:var(--text3);margin-top:1px}
.setting-arrow{color:var(--text3);font-size:16px}
.setting-danger .setting-label{color:var(--red)}
.setting-note{padding:0 4px;font-size:12px;color:var(--text3);line-height:1.7}
.tabbar{height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:20}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--text3);font-size:10px;padding-bottom:env(safe-area-inset-bottom,0)}
.tab.active{color:var(--accent)}
.tab svg{width:22px;height:22px}
/* picker */
.picker-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45)}
.picker-overlay.open{display:flex;flex-direction:column;justify-content:flex-end}
.picker-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding-bottom:env(safe-area-inset-bottom,16px)}
.picker-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.picker-header-title{font-size:15px;font-weight:600;color:var(--text)}
.picker-cancel{background:none;border:none;font-size:15px;color:var(--text3);font-family:inherit;cursor:pointer;padding:4px 8px}
.picker-confirm{background:none;border:none;font-size:15px;color:var(--accent);font-weight:600;font-family:inherit;cursor:pointer;padding:4px 8px}
.picker-labels{display:flex;padding:8px 0 4px;border-top:1px solid var(--border)}
.picker-columns{display:flex;overflow:hidden;height:220px;position:relative}
.picker-columns::before,.picker-columns::after{content:'';position:absolute;left:0;right:0;height:88px;z-index:2;pointer-events:none}
.picker-columns::before{top:0;background:linear-gradient(to bottom,#fff 0%,rgba(255,255,255,0) 100%)}
.picker-columns::after{bottom:0;background:linear-gradient(to top,#fff 0%,rgba(255,255,255,0) 100%)}
.picker-highlight{position:absolute;left:0;right:0;height:44px;top:88px;border-top:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);background:rgba(74,124,111,0.07);pointer-events:none;z-index:1}
.picker-col-wrap{flex:1;display:flex;flex-direction:column}
.picker-col{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:88px 0}
.picker-col::-webkit-scrollbar{display:none}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);scroll-snap-align:center;cursor:pointer;user-select:none}
.picker-sep{font-size:24px;color:var(--text3);display:flex;align-items:center;justify-content:center;width:24px;padding-top:88px;flex-shrink:0}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">添加记录</div>
    <span class="draft-pill" id="draft-pill">草稿已保存</span>
  </div>
  <div class="scroll-area">
    <!-- ADD -->
    <div class="page active" id="page-add">
      <div class="form-card">
        <div class="field">
          <div class="field-label">日期</div>
          <button class="picker-display ph" id="disp-date" onclick="openPicker('date')">
            <span id="disp-date-txt">选择日期</span><span class="arr">▾</span>
          </button>
        </div>
        <div class="field">
          <div class="field-label">时间段（可选）</div>
          <div class="time-row">
            <button class="picker-display ph" id="disp-tstart" onclick="openPicker('tstart')">
              <span id="disp-tstart-txt">开始</span><span class="arr">▾</span>
            </button>
            <div class="time-sep">→</div>
            <button class="picker-display ph" id="disp-tend" onclick="openPicker('tend')">
              <span id="disp-tend-txt">结束</span><span class="arr">▾</span>
            </button>
          </div>
        </div>
        <div class="field">
          <div class="field-label">类别</div>
          <div class="type-grid" id="type-grid">
            <button class="type-btn sel-sleep" data-type="sleep" onclick="selectType('sleep')"><span class="dot" style="background:var(--accent)"></span>睡眠</button>
            <button class="type-btn" data-type="meal" onclick="selectType('meal')"><span class="dot" style="background:var(--blue)"></span>饮食</button>
            <button class="type-btn" data-type="med" onclick="selectType('med')"><span class="dot" style="background:#9a7a3a"></span>用药</button>
            <button class="type-btn" data-type="episode" onclick="selectType('episode')"><span class="dot" style="background:var(--red)"></span>症状</button>
            <button class="type-btn" data-type="note" onclick="selectType('note')"><span class="dot" style="background:var(--gray)"></span>备注</button>
          </div>
        </div>
        <div class="field">
          <div class="field-label">严重程度</div>
          <div class="sev-grid" id="sev-grid">
            <button class="sev-btn sel-none" data-sev="" onclick="selectSev('')">无</button>
            <button class="sev-btn" data-sev="mild" onclick="selectSev('mild')">轻微</button>
            <button class="sev-btn" data-sev="mod" onclick="selectSev('mod')">中度</button>
            <button class="sev-btn" data-sev="sev" onclick="selectSev('sev')">严重</button>
          </div>
        </div>
        <div class="field">
          <div class="field-label">详情（可选）</div>
          <input type="text" id="inp-detail" placeholder="输入描述...">
        </div>
        <button class="btn-add" id="btn-add" onclick="addEntry()">添加记录</button>
      </div>
    </div>
    <!-- LOG -->
    <div class="page" id="page-log">
      <div class="filter-row">
        <button class="chip active" data-f="all" onclick="setFilter('all')">全部</button>
        <button class="chip" data-f="sleep" onclick="setFilter('sleep')">睡眠</button>
        <button class="chip" data-f="meal" onclick="setFilter('meal')">饮食</button>
        <button class="chip" data-f="med" onclick="setFilter('med')">用药</button>
        <button class="chip" data-f="episode" onclick="setFilter('episode')">症状</button>
        <button class="chip" data-f="note" onclick="setFilter('note')">备注</button>
      </div>
      <div id="log-content"></div>
    </div>
    <!-- STATS -->
    <div class="page" id="page-stats">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="chart-card" id="type-chart"></div>
      <div class="chart-card" id="sev-chart"></div>
    </div>
    <!-- SETTINGS -->
    <div class="page" id="page-settings">
      <div class="setting-card">
        <div class="setting-row" onclick="exportCSV()">
          <span class="setting-icon">📤</span>
          <div style="flex:1"><div class="setting-label">导出 CSV</div><div class="setting-sub">备份所有记录到文件</div></div>
          <span class="setting-arrow">›</span>
        </div>
        <div class="setting-row setting-danger" onclick="clearAll()">
          <span class="setting-icon">🗑</span>
          <div style="flex:1"><div class="setting-label">清空所有数据</div><div class="setting-sub">此操作不可恢复</div></div>
          <span class="setting-arrow">›</span>
        </div>
      </div>
      <div class="setting-note">数据保存在本地浏览器，无需联网。<br>建议定期导出 CSV 备份。<br><br>左滑记录可删除，点击记录可编辑。</div>
    </div>
  </div>
  <div class="tabbar">
    <button class="tab active" id="tab-add" onclick="showPage('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>添加
    </button>
    <button class="tab" id="tab-log" onclick="showPage('log')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>日志
    </button>
    <button class="tab" id="tab-stats" onclick="showPage('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="20" x2="4" y2="10"/><line x1="9" y1="20" x2="9" y2="6"/><line x1="14" y1="20" x2="14" y2="14"/><line x1="19" y1="20" x2="19" y2="4"/></svg>统计
    </button>
    <button class="tab" id="tab-settings" onclick="showPage('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置
    </button>
  </div>
</div>
<!-- Picker -->
<div class="picker-overlay" id="picker-overlay" onclick="if(event.target===this)closePicker(false)">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div class="picker-header">
      <button class="picker-cancel" onclick="closePicker(false)">取消</button>
      <div class="picker-header-title" id="picker-title"></div>
      <button class="picker-confirm" onclick="closePicker(true)">确认</button>
    </div>
    <div class="picker-labels" id="picker-labels"></div>
    <div class="picker-columns" id="picker-columns">
      <div class="picker-highlight"></div>
    </div>
  </div>
</div>
<script>
const SK='healthdiary-v2',DK='healthdiary-draft-v2';
const TL={sleep:'睡眠',meal:'饮食',med:'用药',episode:'症状',note:'备注'};
const TC={sleep:'b-sleep',meal:'b-meal',med:'b-med',episode:'b-episode',note:'b-note'};
const TS={sleep:'stripe-sleep',meal:'stripe-meal',med:'stripe-med',episode:'stripe-episode',note:'stripe-note'};
const SL={mild:'轻微',mod:'中度',sev:'严重'};
const SC={mild:'sev-mild',mod:'sev-mod',sev:'sev-sev'};
const BC={sleep:'var(--accent)',meal:'var(--blue)',med:'#9a7a3a',episode:'var(--red)',note:'var(--gray)'};

let entries=[],nextId=1,curFilter='all',curPage='add';
let selType='sleep',selSev='',selDate='',selTStart='',selTEnd='';
let draftTimer=null,pickerMode='',pickerCols=[];
let editingId=null;

function load(){
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);entries=d.entries||[];nextId=d.nextId||(entries.length+1);}}catch(e){entries=[];}
  restoreDraft();
  document.getElementById('inp-detail').addEventListener('input',saveDraft);
  renderLog();
}

function save(){try{localStorage.setItem(SK,JSON.stringify({entries,nextId}));}catch(e){alert('保存失败');}}

function saveDraft(){
  localStorage.setItem(DK,JSON.stringify({date:selDate,tstart:selTStart,tend:selTEnd,type:selType,detail:document.getElementById('inp-detail').value,sev:selSev}));
  const p=document.getElementById('draft-pill');p.textContent='草稿已保存';p.classList.add('on');
  clearTimeout(draftTimer);draftTimer=setTimeout(()=>p.classList.remove('on'),2000);
}
function clearDraft(){localStorage.removeItem(DK);document.getElementById('draft-pill').classList.remove('on');}

function restoreDraft(){
  setToday();
  try{
    const r=localStorage.getItem(DK);
    if(!r)return;
    const d=JSON.parse(r);
    if(d.tstart){selTStart=d.tstart;updateTimeDisp('tstart');}
    if(d.tend){selTEnd=d.tend;updateTimeDisp('tend');}
    if(d.type){selType=d.type;updateTypeUI();}
    if(d.sev!==undefined){selSev=d.sev;updateSevUI();}
    if(d.detail)document.getElementById('inp-detail').value=d.detail;
    if(d.detail||d.tstart){const p=document.getElementById('draft-pill');p.textContent='已恢复草稿';p.classList.add('on');draftTimer=setTimeout(()=>{p.classList.remove('on');p.textContent='草稿已保存';},3000);}
  }catch(e){}
}

function setToday(){
  const t=new Date();
  const y=t.getFullYear();
  const m=String(t.getMonth()+1).padStart(2,'0');
  const d=String(t.getDate()).padStart(2,'0');
  selDate=y+'-'+m+'-'+d;updateDateDisp();
}
function updateDateDisp(){
  const d=new Date(selDate+'T12:00:00');
  document.getElementById('disp-date-txt').textContent=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('disp-date').classList.remove('ph');
}
function updateTimeDisp(which){
  const val=which==='tstart'?selTStart:selTEnd;
  const el=document.getElementById('disp-'+which+'-txt');
  const btn=document.getElementById('disp-'+which);
  if(val){
    let txt=val;
    if(which==='tend'&&selTStart&&val&&val<=selTStart)txt='次日 '+val;
    el.textContent=txt;btn.classList.remove('ph');
  }else{el.textContent=which==='tstart'?'开始':'结束';btn.classList.add('ph');}
}

function selectType(t){selType=t;updateTypeUI();saveDraft();}
function updateTypeUI(){document.querySelectorAll('#type-grid .type-btn').forEach(b=>{b.className='type-btn'+(b.dataset.type===selType?' sel-'+b.dataset.type:'');});}
function selectSev(s){selSev=s;updateSevUI();saveDraft();}
function updateSevUI(){document.querySelectorAll('#sev-grid .sev-btn').forEach(b=>{b.className='sev-btn'+(b.dataset.sev===selSev?' sel-'+(b.dataset.sev||'none'):'');});}

function addEntry(){
  if(!selDate){openPicker('date');return;}
  const detail=document.getElementById('inp-detail').value.trim();
  const entry={id:editingId||nextId++,date:selDate,tstart:selTStart,tend:selTEnd,type:selType,detail,sev:selSev};
  if(editingId){
    const idx=entries.findIndex(e=>e.id===editingId);
    if(idx>-1)entries[idx]=entry;
    editingId=null;
    document.getElementById('btn-add').textContent='添加记录';
  }else{
    entries.push(entry);
  }
  entries.sort((a,b)=>a.date.localeCompare(b.date)||(a.tstart||'').localeCompare(b.tstart||''));
  document.getElementById('inp-detail').value='';
  selTStart='';selTEnd='';
  updateTimeDisp('tstart');updateTimeDisp('tend');
  clearDraft();setToday();save();renderLog();showPage('log');
}

function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editingId=id;
  selDate=e.date;updateDateDisp();
  selTStart=e.tstart||'';selTEnd=e.tend||'';
  updateTimeDisp('tstart');updateTimeDisp('tend');
  selType=e.type;updateTypeUI();
  selSev=e.sev||'';updateSevUI();
  document.getElementById('inp-detail').value=e.detail||'';
  document.getElementById('btn-add').textContent='保存修改';
  showPage('add');
  document.querySelector('.scroll-area').scrollTop=0;
  closeAllSwipes();
}

function deleteEntry(id){
  entries=entries.filter(e=>e.id!==id);
  save();renderLog();
}

/* swipe to delete */
let swipeCurrent=null;
function closeAllSwipes(){
  document.querySelectorAll('.entry-card.swiped').forEach(c=>{c.classList.remove('swiped');});
  swipeCurrent=null;
}

function initSwipe(card,id){
  let x0=0,y0=0,dx=0,dir=null,wasSwiped=false;
  card.addEventListener('touchstart',e=>{
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;dx=0;dir=null;
    wasSwiped=card.classList.contains('swiped');
    if(swipeCurrent&&swipeCurrent!==card){closeAllSwipes();}
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    dx=e.touches[0].clientX-x0;
    const dy=e.touches[0].clientY-y0;
    if(!dir){if(Math.abs(dx)<4&&Math.abs(dy)<4)return;dir=Math.abs(dx)>Math.abs(dy)?'h':'v';}
    if(dir!=='h')return;
    e.preventDefault();
    const base=wasSwiped?-88:0;
    const tx=Math.min(0,Math.max(-88,base+dx));
    card.style.transition='none';
    card.style.transform='translateX('+tx+'px)';
  },{passive:false});
  card.addEventListener('touchend',()=>{
    card.style.transition='';
    card.style.transform='';
    if(dir===null||dir==='v'){
      if(!wasSwiped)editEntry(id);
      else closeAllSwipes();
      return;
    }
    if(wasSwiped){
      if(dx>30){card.classList.remove('swiped');swipeCurrent=null;}
      else card.classList.add('swiped');
    }else{
      if(dx<-40){card.classList.add('swiped');swipeCurrent=card;}
      else card.classList.remove('swiped');
    }
  });
}

function setFilter(f){curFilter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.f===f));renderLog();}

function showPage(p){
  curPage=p;
  ['add','log','stats','settings'].forEach(n=>{document.getElementById('page-'+n).classList.toggle('active',n===p);document.getElementById('tab-'+n).classList.toggle('active',n===p);});
  document.getElementById('topbar-title').textContent={add:editingId?'编辑记录':'添加记录',log:'日志',stats:'数据统计',settings:'设置'}[p];
  document.querySelector('.scroll-area').scrollTop=0;
  if(p==='stats')renderStats();
  if(p!=='add'&&editingId){editingId=null;document.getElementById('btn-add').textContent='添加记录';}
}

function renderLog(){
  const filtered=curFilter==='all'?entries:entries.filter(e=>e.type===curFilter);
  const el=document.getElementById('log-content');
  if(!filtered.length){el.innerHTML='<div class="empty">暂无记录<br><span style="font-size:12px">左滑删除，点击编辑</span></div>';return;}
  const byDate={};filtered.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=dates.map(date=>{
    const rows=byDate[date];
    const d=new Date(date+'T12:00:00');
    const label=d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
    return '<div class="day-block"><div class="day-head"><span class="day-date-label">'+label+'</span><span class="day-count">'+rows.length+'条</span></div>'+
    rows.map(e=>{
      const nextDay=e.tstart&&e.tend&&e.tend<=e.tstart;const timeStr=e.tstart?(e.tend?e.tstart+' → '+(nextDay?'次日 ':'')+e.tend:e.tstart):'';
      return '<div class="swipe-wrapper"><div class="del-bg" onclick="deleteEntry('+e.id+')"><div class="del-bg-icon">✕</div><div class="del-bg-txt">删除</div></div>'+
      '<div class="entry-card" id="ec-'+e.id+'"><div class="entry-stripe '+TS[e.type]+'"></div><div class="entry-body"><div class="entry-top"><span class="badge '+TC[e.type]+'">'+TL[e.type]+'</span>'+(e.sev?'<span class="sev-tag '+SC[e.sev]+'">'+SL[e.sev]+'</span>':'')+(timeStr?'<span class="entry-time-txt">'+timeStr+'</span>':'')+'</div><div class="entry-detail'+(e.detail?'':' muted')+'">'+(e.detail?esc(e.detail):'无详情')+'</div></div><span class="entry-edit-icon">›</span></div></div>';
    }).join('')+'</div>';
  }).join('');
  // attach swipe
  entries.forEach(e=>{
    const card=document.getElementById('ec-'+e.id);
    if(card)initSwipe(card,e.id);
  });
}

/* picker */
function buildPickerCol(items,current,label){
  const wrap=document.createElement('div');wrap.className='picker-col-wrap';
  const col=document.createElement('div');col.className='picker-col';
  items.forEach(item=>{const el=document.createElement('div');el.className='picker-item';el.textContent=item.label;col.appendChild(el);});
  wrap.appendChild(col);
  let st;
  col.addEventListener('scroll',()=>{clearTimeout(st);st=setTimeout(()=>{const idx=Math.round(col.scrollTop/44);col.scrollTo({top:Math.max(0,idx)*44,behavior:'smooth'});},80);},{passive:true});
  setTimeout(()=>{const idx=Math.max(0,items.findIndex(i=>i.value===current));col.scrollTop=idx*44;},60);
  return {wrap,col,items,label};
}
function getColVal(col,items){return items[Math.min(Math.max(Math.round(col.scrollTop/44),0),items.length-1)].value;}

function openPicker(mode){
  pickerMode=mode;
  const container=document.getElementById('picker-columns');
  while(container.children.length>1)container.removeChild(container.lastChild);
  pickerCols=[];
  const labelsRow=document.getElementById('picker-labels');labelsRow.innerHTML='';

  if(mode==='date'){
    document.getElementById('picker-title').textContent='选择日期';
    const now=selDate?new Date(selDate+'T12:00:00'):new Date();
    const cy=now.getFullYear(),cm=now.getMonth()+1,cd=now.getDate();
    const years=[];for(let y=2024;y<=2030;y++)years.push({value:String(y),label:y+'年'});
    const months=[];for(let m=1;m<=12;m++)months.push({value:String(m).padStart(2,'0'),label:m+'月'});
    const dc=new Date(cy,cm,0).getDate();
    const days=[];for(let d=1;d<=dc;d++)days.push({value:String(d).padStart(2,'0'),label:d+'日'});
    const yO=buildPickerCol(years,String(cy),'年');
    const mO=buildPickerCol(months,String(cm).padStart(2,'0'),'月');
    const dO=buildPickerCol(days,String(cd).padStart(2,'0'),'日');
    pickerCols=[yO,mO,dO];
    [yO,mO,dO].forEach(pc=>{container.appendChild(pc.wrap);const l=document.createElement('div');l.style.cssText='flex:1;text-align:center;font-size:12px;font-weight:600;color:var(--accent)';l.textContent=pc.label;labelsRow.appendChild(l);});
  }else{
    const which=mode==='tstart'?'开始时间':'结束时间';
    document.getElementById('picker-title').textContent=which;
    const cur=mode==='tstart'?selTStart:selTEnd;
    const curH=cur?cur.split(':')[0]:'';
    const curM=cur?cur.split(':')[1]:'';
    const hours=[{value:'',label:'不填'}];for(let h=0;h<24;h++)hours.push({value:String(h).padStart(2,'0'),label:String(h).padStart(2,'0')});
    const mins=[{value:'',label:'--'}];for(let m=0;m<60;m+=5)mins.push({value:String(m).padStart(2,'0'),label:String(m).padStart(2,'0')});
    const sep=document.createElement('div');sep.className='picker-sep';sep.textContent=':';
    const hO=buildPickerCol(hours,curH,'时');
    const mO=buildPickerCol(mins,curM,'分');
    pickerCols=[hO,mO];
    container.appendChild(hO.wrap);container.appendChild(sep);container.appendChild(mO.wrap);
    ['时','','分'].forEach((l,i)=>{const d=document.createElement('div');d.style.cssText='flex:'+(i===1?'0 0 24px':'1')+';text-align:center;font-size:12px;font-weight:600;color:var(--accent)';d.textContent=l;labelsRow.appendChild(d);});
  }
  document.getElementById('picker-overlay').classList.add('open');
}

function closePicker(confirm){
  if(confirm){
    if(pickerMode==='date'){
      const y=getColVal(pickerCols[0].col,pickerCols[0].items);
      const m=getColVal(pickerCols[1].col,pickerCols[1].items);
      const d=getColVal(pickerCols[2].col,pickerCols[2].items);
      selDate=y+'-'+m+'-'+d;updateDateDisp();
    }else{
      const h=getColVal(pickerCols[0].col,pickerCols[0].items);
      const m=getColVal(pickerCols[1].col,pickerCols[1].items);
      const val=h?(h+':'+(m||'00')):'';
      if(pickerMode==='tstart'){
        selTStart=val;
        updateTimeDisp('tstart');
        // auto open tend with start time pre-set
        if(val){
          document.getElementById('picker-overlay').classList.remove('open');
          saveDraft();
          setTimeout(()=>openPicker('tend'),180);
          return;
        }
      }else{
        selTEnd=val;
        updateTimeDisp('tend');
        updateNextDayHint();
      }
    }
    saveDraft();
  }
  document.getElementById('picker-overlay').classList.remove('open');
}

function updateNextDayHint(){
  if(selTStart&&selTEnd&&selTEnd<=selTStart){
    document.getElementById('disp-tend-txt').textContent='次日 '+selTEnd;
  }
}

function renderStats(){
  const total=entries.length,days=new Set(entries.map(e=>e.date)).size;
  const eps=entries.filter(e=>e.type==='episode').length,sv=entries.filter(e=>e.type==='episode'&&e.sev==='sev').length;
  document.getElementById('stats-grid').innerHTML=[{n:total,l:'总记录'},{n:days,l:'记录天数'},{n:eps,l:'症状次数'},{n:sv,l:'严重发作'}].map(s=>'<div class="stat-card"><div class="stat-n">'+s.n+'</div><div class="stat-l">'+s.l+'</div></div>').join('');
  const tc={};Object.keys(TL).forEach(t=>tc[t]=entries.filter(e=>e.type===t).length);
  const mx=Math.max(...Object.values(tc),1);
  document.getElementById('type-chart').innerHTML='<div class="chart-title">各类别数量</div>'+Object.keys(TL).map(t=>'<div class="bar-row"><span class="bar-label">'+TL[t]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(tc[t]/mx*100)+'%;background:'+BC[t]+'"></div></div><span class="bar-count">'+tc[t]+'</span></div>').join('');
  const sc={mild:0,mod:0,sev:0};entries.filter(e=>e.type==='episode').forEach(e=>{if(e.sev)sc[e.sev]++;});
  const ms=Math.max(...Object.values(sc),1);const scc={mild:'#639922',mod:'#ba7517',sev:'#a32d2d'};
  document.getElementById('sev-chart').innerHTML='<div class="chart-title">症状严重程度</div>'+Object.keys(SL).map(s=>'<div class="bar-row"><span class="bar-label">'+SL[s]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(sc[s]/ms*100)+'%;background:'+scc[s]+'"></div></div><span class="bar-count">'+sc[s]+'</span></div>').join('');
}

function exportCSV(){if(!entries.length){alert('暂无数据');return;}const h='日期,开始时间,结束时间,类别,详情,严重程度\n';const r=entries.map(e=>[e.date,e.tstart||'',e.tend||'',TL[e.type],'"'+(e.detail||'').replace(/"/g,'""')+'"',e.sev?SL[e.sev]:''].join(',')).join('\n');const b=new Blob(['\uFEFF'+h+r],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='健康日记_'+new Date().toISOString().slice(0,10)+'.csv';a.click();}
function clearAll(){if(!confirm('确定清空所有记录？此操作不可恢复。'))return;entries=[];nextId=1;save();renderLog();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
load();
</script>
